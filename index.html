<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Tap Miner ONLINE PRO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
margin:0;font-family:Arial;text-align:center;
background:linear-gradient(#4facfe,#00f2fe);
color:white;
}

#block{
width:200px;height:200px;margin:20px auto;
border:6px solid #333;
}

.stone{background:#777;}
.dirt{background:#6b4423;}
.diamond{background:#00eaff;}
.boss{background:red;}

button{
padding:10px;margin:5px;
border:none;border-radius:10px;
background:#ff9800;color:white;
}

#leaderboard{
background:#222;padding:10px;margin-top:10px;
}
</style>
</head>

<body>

<h2>⛏ Tap Miner ONLINE</h2>

<p>Нік: <input id="nick" placeholder="Введи ім'я"></p>

<p>Рівень: <span id="level">1</span> |
💰: <span id="coins">0</span></p>

<div id="block" class="stone"></div>

<button onclick="mine()">Тап!</button>

<div id="leaderboard">
<h3>🏆 ТОП гравців</h3>
<div id="top"></div>
</div>

<script>
/* встав сюди свій config */
const firebaseConfig = {
apiKey: "ТВОЄ",
authDomain: "ТВОЄ",
databaseURL: "ТВОЄ",
projectId: "ТВОЄ"
};

firebase.initializeApp(firebaseConfig);
let db = firebase.database();

/* дані */
let data = JSON.parse(localStorage.getItem("game")) || {
level:1,coins:0,hp:10,maxHp:10
};

/* клік */
function mine(){
data.hp--;

if(data.hp<=0){
data.level++;
data.coins+=10;
data.hp=data.maxHp;

/* бос */
if(data.level%5==0){
data.hp=50;
block.className="boss";
}else{
let types=["stone","dirt","diamond"];
block.className=types[Math.floor(Math.random()*3)];
}
}

save();
update();
}

/* сейв */
function save(){
localStorage.setItem("game",JSON.stringify(data));

let name=document.getElementById("nick").value || "NoName";

/* онлайн сейв */
db.ref("players/"+name).set({
level:data.level,
coins:data.coins
});
}

/* топ */
db.ref("players").on("value",snap=>{
let players=snap.val();
let arr=[];

for(let p in players){
arr.push({name:p,...players[p]});
}

arr.sort((a,b)=>b.level-a.level);

let html="";
arr.slice(0,5).forEach(p=>{
html+=p.name+" — lvl "+p.level+"<br>";
});

top.innerHTML=html;
});

/* оновлення */
function update(){
level.innerText=data.level;
coins.innerText=data.coins;
}

update();
</script>

</body>
</html>
